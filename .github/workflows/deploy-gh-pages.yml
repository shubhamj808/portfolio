# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy React/Vite site to Pages

on:
  release:
    types: [published] # Trigger on release publication
  workflow_dispatch: # Allow manual triggering of the workflow

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  reusable-build-workflow:
    uses: ./.github/workflows/reusable-build-workflow.yaml
    with:
      node-version: "23.7.0" # Specify the Node.js version to use

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: reusable-build-workflow
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # This ensures checkout at the release tag
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
