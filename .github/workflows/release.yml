name: Release

on:
  push:
    branches:
      - release/*

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important! semantic-release needs full history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23.7.0

      - name: Install dependencies
        run: |
          npm install
          npm ci

      - name: Get next release version
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # git pull origin main --no-rebase || true
          npx semantic-release --dry-run | tee sr.log
          version=$(grep -oP 'Release note for version \K[0-9]+\.[0-9]+\.[0-9]+' sr.log | tail -1)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          current_branch=$(git rev-parse --abbrev-ref HEAD)
          echo "Current branch: $current_branch"
          # echo "Setting release branch in .releaserc.json to: $current_branch"
          # sed -i "s|release/\*|$current_branch|g" .releaserc.json
          # cat .releaserc.json
          echo "Running semantic-release on branch: $current_branch"
          npx semantic-release

      - name: Create Pull Request to main
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: release v${{ steps.get_version.outputs.version }}"
          title: "Release v${{ steps.get_version.outputs.version }}"
          body: "Automated PR to merge ${{ github.ref_name }} into main"
          branch: ${{ github.ref_name }}
          base: main

      - name: Auto-merge Pull Request
        if: steps.create_pr.outputs.pull-request-number != ''
        run: |
          pr_number=${{ steps.create_pr.outputs.pull-request-number }}
          gh pr merge "$pr_number" --squash
